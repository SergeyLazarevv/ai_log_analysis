services:
  ollama:
    image: "ollama/ollama:latest"
    restart: unless-stopped
    environment:
      # Заставить Ollama (Go) использовать системное хранилище CA (в т.ч. certs из ./certs)
      - SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt
      - SSL_CERT_DIR=/etc/ssl/certs
      # CPU: число потоков для инференса (по умолчанию авто; задай по числу ядер хоста для ускорения)
      - OLLAMA_NUM_THREADS=8
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - |
        set -e
        # In some environments HTTPS is intercepted (custom CA). Installing a local CA bundle fixes `ollama pull`.
        # If no extra certs are mounted, this is a no-op.
        update-ca-certificates >/dev/null 2>&1 || true
        exec /bin/ollama serve
    ports:
      # 11435 на хосте, если локальный Ollama уже занял 11434
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
      # Optional: offline/local model import (GGUF files)
      - ./models:/models
      # Optional: custom CA certificates.
      # If your network intercepts HTTPS (corporate proxy), put your CA .crt files into ./certs/
      # and they will be picked up by update-ca-certificates at container start.
      - ./certs:/usr/local/share/ca-certificates/local:ro
    networks:
      - ollama_net
    # If you have an NVIDIA GPU and proper drivers/toolkit, you can enable:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # Open WebUI - веб-интерфейс для работы с Ollama
  open-webui:
    image: "ghcr.io/open-webui/open-webui:main"
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - |
        set -e
        update-ca-certificates >/dev/null 2>&1 || true
        exec bash start.sh
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      # Отключаем загрузку с Hugging Face (sentence-transformers для Documents/RAG).
      # Чат с локальной моделью работает без этого. Убирает ошибки SSL при перехвате HTTPS.
      - HF_HUB_OFFLINE=1
      - RAG_EMBEDDING_MODEL_AUTO_UPDATE=false
    volumes:
      - open_webui_data:/app/backend/data
      - ./certs:/usr/local/share/ca-certificates/local:ro
    depends_on:
      - ollama
    networks:
      - ollama_net

  # Optional helper: downloads a lightweight model once, then exits.
  # Run it when you need: `docker compose --profile init up pull-model`
  pull-model:
    image: "ollama/ollama:latest"
    profiles: ["init"]
    depends_on:
      - ollama
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - |
        set -e
        echo "Waiting for Ollama..."
        for i in $(seq 1 60); do
          wget -qO- http://ollama:11434/api/tags >/dev/null 2>&1 && break || true
          sleep 1
        done
        echo "Pulling lightweight model: llama3.2:1b"
        ollama pull llama3.2:1b
        echo "Done."
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ollama_net

networks:
  ollama_net:
    driver: bridge

volumes:
  ollama_data:
  open_webui_data:
