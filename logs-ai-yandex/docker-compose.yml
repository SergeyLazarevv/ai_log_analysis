services:
  logs-ai-yandex:
    build: .
    ports:
      - "3020:8000"
    env_file:
      - ../.env
    environment:
      - YANDEX_API_KEY=${YANDEX_API_KEY}
      - YANDEX_CATALOG_ID=${YANDEX_CATALOG_ID}
      - GRAYLOG_MCP_URL=${GRAYLOG_MCP_URL:-http://host.docker.internal:9000/api/mcp}
      - GRAYLOG_MCP_AUTH=${GRAYLOG_MCP_AUTH}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
