<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logs AI + Yandex</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <style>
        :root {
            --bg: #0f1419;
            --surface: #1a2332;
            --border: #2d3a4a;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79b8ff;
            --user-msg: #238636;
            --assistant-msg: #1f6feb;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }
        header h1 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 600;
        }
        header p {
            margin: 0.25rem 0 0;
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }
        .msg {
            margin-bottom: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            max-width: 85%;
            word-wrap: break-word;
        }
        .msg.user {
            margin-left: auto;
            background: var(--user-msg);
            color: white;
        }
        .msg.assistant {
            background: var(--surface);
            border: 1px solid var(--border);
        }
        .msg .role {
            font-size: 0.7rem;
            text-transform: uppercase;
            opacity: 0.8;
            margin-bottom: 0.25rem;
        }
        #form {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            background: var(--surface);
        }
        #form form {
            display: flex;
            gap: 0.5rem;
            max-width: 800px;
            margin: 0 auto;
        }
        #input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--text);
            font-size: 1rem;
        }
        #input:focus {
            outline: none;
            border-color: var(--accent);
        }
        button {
            padding: 0.75rem 1.5rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
        }
        button:hover {
            background: var(--accent-hover);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .loading {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid var(--text-muted);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error {
            background: #da3633;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Logs AI + Yandex</h1>
        <p>Задайте вопрос по логам — модель обратится к Graylog через MCP и даст ответ</p>
    </header>

    <div id="chat"></div>

    <div id="form">
        <form onsubmit="return handleSubmit(event)">
            <input
                id="input"
                type="text"
                placeholder="Например: Покажи ошибки за последний час и кратко резюмируй"
                autocomplete="off"
            />
            <button type="submit" id="btn">Отправить</button>
        </form>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const btn = document.getElementById('btn');

        function addMsg(role, text) {
            const div = document.createElement('div');
            div.className = 'msg ' + role;
            div.innerHTML = '<div class="role">' + (role === 'user' ? 'Вы' : 'Yandex') + '</div><div>' + escapeHtml(text) + '</div>';
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function escapeHtml(s) {
            const div = document.createElement('div');
            div.textContent = s;
            return div.innerHTML.replace(/\n/g, '<br>');
        }

        function handleSubmit(e) {
            e.preventDefault();
            e.stopPropagation();
            const text = input.value.trim();
            if (!text) return false;

            addMsg('user', text);
            input.value = '';
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>';

            fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            })
            .then(function(res) {
                return res.text().then(function(txt) {
                    var data;
                    try { data = JSON.parse(txt); } catch (_) { data = { detail: txt }; }
                    if (!res.ok) {
                        addMsg('assistant', 'Ошибка: ' + (data.detail || res.statusText));
                    } else {
                        addMsg('assistant', data.response || '');
                    }
                });
            })
            .catch(function(err) {
                addMsg('assistant', 'Ошибка сети: ' + err.message);
            })
            .finally(function() {
                btn.disabled = false;
                btn.textContent = 'Отправить';
            });

            return false;
        }
    </script>
</body>
</html>
